name: FusionSolar fetch

# Pulls all FusionSolar sites and commits the refreshed data files back into
# the repo. Runs on a free cloud runner (ubuntu-latest) - fetch.py patches
# /etc/hosts with the IP for intl.fusionsolar.huawei.com (via Google DNS or a
# stable fallback IP), so no self-hosted runner is needed.
#
# Same DNS trick is used by the proven Nautica/FusionSolar scraper workflow.

on:
  # Every 5 minutes during daylight. FusionSolar's underlying data refreshes
  # Every 5 min during daylight, offset by 2 minutes from the standard
  # */5 slots. Standard slots (:00, :05, :10, ...) are heavily contested
  # on GitHub's free tier - hundreds of thousands of repos schedule there
  # and runs get dropped or delayed under load. Offset slots (:02, :07,
  # :12, ...) typically land in less-loaded queues, improving the odds
  # any given slot actually fires. This is a best-effort optimisation;
  # GitHub still doesn't guarantee scheduled runs, so expect occasional
  # missed slots regardless. 04:00-16:00 UTC == 06:00-18:00 SAST.
  schedule:
    - cron: "2-59/5 4-16 * * *"
  # Allow a manual run from the Actions tab.
  workflow_dispatch:

# Stop two runs overlapping - the Northbound API allows only one live session
# per account, and concurrent runs would fight over the token.
concurrency:
  group: fusionsolar-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write          # needed to commit refreshed data back

    defaults:
      run:
        working-directory: platforms/fusionsolar

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dig (for DNS workaround)
        # ubuntu-latest already has dig via the dnsutils package, but install
        # explicitly so the fetch.py DNS fix can rely on it being present.
        working-directory: ${{ github.workspace }}
        run: |
          if ! command -v dig >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y dnsutils
          fi

      - name: Fetch all FusionSolar sites
        env:
          FUSIONSOLAR_USERNAME: ${{ secrets.FUSIONSOLAR_USERNAME }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          # FUSIONSOLAR_HOST is hardcoded in fetch.py - no secret needed.
        run: python fetch.py

      - name: Commit refreshed data
        # Runs even if a later step fails; skips cleanly when nothing changed.
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platforms/fusionsolar/sites/*/data.json \
                  platforms/fusionsolar/sites/*/history.json \
                  platforms/fusionsolar/sites/*/hourly_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "FusionSolar refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
