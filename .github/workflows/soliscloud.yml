name: SolisCloud fetch

on:
  schedule:
    - cron: "6-59/5 4-16 * * *"
  workflow_dispatch:

concurrency:
  group: soliscloud-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    defaults:
      run:
        working-directory: platforms/soliscloud
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch all SolisCloud sites
        env:
          SOLIS_KEY_ID:     ${{ secrets.SOLIS_KEY_ID }}
          SOLIS_KEY_SECRET: ${{ secrets.SOLIS_KEY_SECRET }}
        run: python fetch.py
      - name: Commit refreshed data
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add platforms/soliscloud/sites/*/data.json \
                  platforms/soliscloud/sites/*/history.json \
                  platforms/soliscloud/sites/*/hourly_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "SolisCloud refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
